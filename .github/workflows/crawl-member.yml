name: Member crawl (Edge)

on:
  schedule:
    # - cron: "*/10 * * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  call-member-crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Invoke member-crawl Edge Function
        run: |
          set -e
          echo "member-crawl 호출…"
          # 한 호출당 목록 페이지 수: Edge 시크릿 CRAWL_PAGES_PER_RUN (기본 1) 또는 본문 page_count
          response=$(curl -sS -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"automated":true,"page_count":1}' \
            "https://${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co/functions/v1/member-crawl")
          http_code="${response: -3}"
          body="${response%???}"
          echo "HTTP: $http_code"
          echo "Body: $body"
          if [ "$http_code" -eq 200 ]; then
            echo "완료"
          else
            echo "실패"
            exit 1
          fi
